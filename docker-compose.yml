version: "3.9"

services:
  # --- Backend API ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEVFORGE_REDIS_URL=redis://redis:6379/0
      - DEVFORGE_CELERY_BROKER_URL=redis://redis:6379/0
      - DEVFORGE_CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEVFORGE_OLLAMA_BASE_URL=http://ollama:11434
      - DEVFORGE_OLLAMA_MODEL=codellama:7b
      - DEVFORGE_CHROMA_PERSIST_DIRECTORY=/app/data/chromadb
      - DEVFORGE_SANDBOX_IMAGE=python:3.12-slim
      - DEVFORGE_MAX_DEBUG_ITERATIONS=5
    volumes:
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    networks:
      - devforge

  # --- Celery Worker ---
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DEVFORGE_REDIS_URL=redis://redis:6379/0
      - DEVFORGE_CELERY_BROKER_URL=redis://redis:6379/0
      - DEVFORGE_CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEVFORGE_OLLAMA_BASE_URL=http://ollama:11434
      - DEVFORGE_OLLAMA_MODEL=codellama:7b
      - DEVFORGE_CHROMA_PERSIST_DIRECTORY=/app/data/chromadb
    volumes:
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    networks:
      - devforge

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devforge

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - devforge

  # --- Ollama (LLM Runtime) ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - devforge
    deploy:
      resources:
        reservations:
          memory: 4G

  # --- Prometheus (Monitoring) ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - devforge

  # --- Grafana (Dashboards) ---
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=devforge
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devforge

volumes:
  backend_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  devforge:
    driver: bridge
